<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tamil Movie Explorer</title>
    <style>
        /* Modern Dark Theme */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: #121212; 
            color: #ffffff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #1e1e1e; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); 
            width: 500px; 
            text-align: center; 
            border: 1px solid #333;
        }
        h1 { 
            color: #f5c518; /* IMDb Yellow */
            margin-bottom: 10px; 
            font-size: 24px;
        }
        p { 
            line-height: 1.7; 
            color: #bbbbbb; 
            min-height: 120px; 
            font-size: 16px;
        }
        .controls { 
            margin-top: 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        button { 
            background: #f5c518; 
            border: none; 
            padding: 12px 25px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 14px;
            transition: all 0.3s ease; 
            color: #000;
        }
        button:hover { 
            background: #ffdb58; 
            transform: translateY(-2px);
        }
        button:disabled { 
            background: #444; 
            color: #777;
            cursor: not-allowed; 
            transform: none;
        }
        .counter { 
            font-size: 14px; 
            color: #666; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="movie-name">Loading Movies...</h1>
        <p id="movie-desc">Fetching data from your CSV file.</p>
        
        <div class="controls">
            <button id="prev-btn" onclick="prevMovie()" disabled>PREVIOUS</button>
            <span class="counter" id="counter">0 / 0</span>
            <button id="next-btn" onclick="nextMovie()">NEXT</button>
        </div>
    </div>

    <script>
        let movies = [];
        let currentIndex = 0;

        // 1. Fetch data from our Flask API
        async function loadMovies() {
            try {
                const response = await fetch('/api/movies');
                movies = await response.json();
                if (movies.length > 0) {
                    updateDisplay();
                } else {
                    document.getElementById('movie-name').innerText = "No Data Found";
                    document.getElementById('movie-desc').innerText = "Check if your CSV file is empty or formatted correctly.";
                }
            } catch (error) {
                console.error("Error loading movies:", error);
                document.getElementById('movie-name').innerText = "Error";
                document.getElementById('movie-desc').innerText = "Could not connect to the server.";
            }
        }

        // 2. Update the UI with current movie details
        function updateDisplay() {
            const movie = movies[currentIndex];
            
            // Note: Field names ('Name', 'Description') must match your CSV headers exactly!
            document.getElementById('movie-name').innerText = movie.Name || movie.title || "Unknown Title";
            document.getElementById('movie-desc').innerText = movie.Description || movie.plot || "No plot summary available.";
            
            document.getElementById('counter').innerText = `${currentIndex + 1} / ${movies.length}`;
            
            // Update button states
            document.getElementById('prev-btn').disabled = currentIndex === 0;
            document.getElementById('next-btn').disabled = currentIndex === movies.length - 1;
        }

        // 3. Button Functions
        function nextMovie() {
            if (currentIndex < movies.length - 1) {
                currentIndex++;
                updateDisplay();
            }
        }

        function prevMovie() {
            if (currentIndex > 0) {
                currentIndex--;
                updateDisplay();
            }
        }

        // Initialize
        loadMovies();
    </script>
</body>
</html>
